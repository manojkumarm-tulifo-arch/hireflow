openapi: 3.1.0
info:
  title: hireflow — sourcing (slice 2)
  version: "1.0.0-slice2"
  description: |
    Resume ingestion and candidate detail endpoints.
    Slice 2 adds resume parsing, candidate aggregates, and the candidate detail endpoint.
paths:
  /intents/{intent_id}/resumes:batch:
    post:
      summary: Upload a batch of resumes against an intent
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: intent_id, in: path, required: true, schema: { type: string, format: uuid } }
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                resume:
                  type: array
                  items: { type: string, format: binary }
      responses:
        '200':
          description: per-file outcome
          content:
            application/json:
              schema: { $ref: '#/components/schemas/BatchUploadResponse' }
        '400': { description: bad request }
        '401': { description: missing identity }
  /resumes/batches/{batch_id}:
    get:
      summary: Get aggregated status of a batch
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: batch_id, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        '200':
          description: status snapshot
          content:
            application/json:
              schema: { $ref: '#/components/schemas/BatchStatusResponse' }
        '401': { description: missing identity }
  /candidates/{candidate_id}:
    get:
      summary: Get candidate detail with decrypted PII
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: candidate_id, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        '200':
          description: candidate detail
          content:
            application/json:
              schema: { $ref: '#/components/schemas/CandidateDetailResponse' }
        '401': { description: missing identity }
        '404': { description: candidate not found }
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    BatchUploadResponse:
      type: object
      properties:
        batch_id: { type: string, format: uuid }
        items:
          type: array
          items: { $ref: '#/components/schemas/BatchItemResponse' }
    BatchItemResponse:
      type: object
      properties:
        filename: { type: string }
        upload_id: { type: string, format: uuid }
        status: { type: string, enum: [queued, deduplicated] }
        candidate_id: { type: string, format: uuid }
        error: { $ref: '#/components/schemas/BatchItemError' }
    BatchItemError:
      type: object
      properties:
        code: { type: string }
        message: { type: string }
        detail: { type: object, additionalProperties: true }
    BatchStatusResponse:
      type: object
      properties:
        batch_id: { type: string, format: uuid }
        intent_id: { type: string, format: uuid }
        summary: { $ref: '#/components/schemas/BatchStatusSummary' }
        items:
          type: array
          items: { $ref: '#/components/schemas/BatchStatusItem' }
    BatchStatusSummary:
      type: object
      properties:
        total: { type: integer }
        in_flight: { type: integer }
        extracted: { type: integer }
        failed: { type: integer }
        quarantined: { type: integer }
    BatchStatusItem:
      type: object
      properties:
        upload_id: { type: string, format: uuid }
        filename: { type: string }
        status: { type: string }
        attempt: { type: integer }
        last_error: { type: string }
    CandidateDetailResponse:
      type: object
      properties:
        id: { type: string, format: uuid }
        content_hash: { type: string }
        personal: { $ref: '#/components/schemas/CandidatePersonal' }
        location: { type: string }
        headline: { type: string }
        profile:
          type: object
          description: Full parsed profile with PII in cleartext (server-side decrypted).
          additionalProperties: true
        source: { type: string }
        created_at: { type: string, format: date-time }
    CandidatePersonal:
      type: object
      properties:
        full_name: { type: string }
        email: { type: string, format: email }
        phone: { type: string }
