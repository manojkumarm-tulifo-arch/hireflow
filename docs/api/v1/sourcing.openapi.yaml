openapi: 3.1.0
info:
  title: hireflow — sourcing (slice 5)
  version: "1.0.0-slice5"
  description: |
    Resume ingestion, candidate detail, ranked Application list, and recruiter
    dashboard endpoints. Slice 4 adds Application lifecycle actions
    (shortlist/reject/hire), retry for failed uploads, on-demand rescore,
    GDPR erasure, and SSE live batch progress. Slice 5 adds ZIP fan-out
    (extract entries server-side, each surfaces as separate item) and
    per-intent deduplication with new status markers.
paths:
  /intents/{intent_id}/resumes:batch:
    post:
      summary: Upload a batch of resumes against an intent
      description: |
        Upload resumes (PDF, DOC, DOCX, ODT, or ZIP) for batch processing.
        ZIP files are extracted server-side; each entry surfaces as a separate item.
        Supported MIME types: application/pdf, application/msword,
        application/vnd.openxmlformats-officedocument.wordprocessingml.document,
        application/vnd.oasis.opendocument.text, application/zip
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: intent_id, in: path, required: true, schema: { type: string, format: uuid } }
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                resume:
                  type: array
                  items: { type: string, format: binary }
      responses:
        '200':
          description: per-file outcome
          content:
            application/json:
              schema: { $ref: '#/components/schemas/BatchUploadResponse' }
        '400': { description: bad request }
        '401': { description: missing identity }
  /resumes/batches/{batch_id}:
    get:
      summary: Get aggregated status of a batch
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: batch_id, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        '200':
          description: status snapshot
          content:
            application/json:
              schema: { $ref: '#/components/schemas/BatchStatusResponse' }
        '401': { description: missing identity }
  /intents/{intent_id}/applications:
    get:
      summary: List Applications for an intent, ranked
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: intent_id, in: path, required: true, schema: { type: string, format: uuid } }
        - { name: status, in: query, required: false, schema: { type: string } }
        - { name: min_score, in: query, required: false, schema: { type: number } }
        - { name: sort, in: query, required: false, schema: { type: string, enum: [score_desc, recent], default: score_desc } }
        - { name: limit, in: query, required: false, schema: { type: integer, default: 50 } }
        - { name: offset, in: query, required: false, schema: { type: integer, default: 0 } }
      responses:
        '200':
          description: ranked Applications
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ApplicationListResponse' }
        '401': { description: missing identity }
        '400': { description: bad request }
  /candidates/{candidate_id}:
    get:
      summary: Get candidate detail with decrypted PII
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: candidate_id, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        '200':
          description: candidate detail
          content:
            application/json:
              schema: { $ref: '#/components/schemas/CandidateDetailResponse' }
        '401': { description: missing identity }
        '404': { description: candidate not found }
    delete:
      summary: GDPR erasure — cascade-delete candidate and all related data
      tags: [recruiter-actions]
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: candidate_id, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        '204': { description: candidate erased }
        '401': { description: missing identity }
        '404': { description: candidate not found }
  /applications/{application_id}:shortlist:
    post:
      summary: Shortlist an application
      tags: [recruiter-actions]
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: application_id, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        '204': { description: application shortlisted }
        '401': { description: missing identity }
        '404': { description: application not found }
        '409': { description: invalid state transition }
  /applications/{application_id}:reject:
    post:
      summary: Reject an application
      tags: [recruiter-actions]
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: application_id, in: path, required: true, schema: { type: string, format: uuid } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ApplicationRejectRequest' }
      responses:
        '204': { description: application rejected }
        '400': { description: missing or empty reason }
        '401': { description: missing identity }
        '404': { description: application not found }
        '409': { description: invalid state transition }
  /applications/{application_id}:hire:
    post:
      summary: Mark an application as hired
      tags: [recruiter-actions]
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: application_id, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        '204': { description: application marked hired }
        '401': { description: missing identity }
        '404': { description: application not found }
        '409': { description: invalid state transition }
  /resumes/{upload_id}:retry:
    post:
      summary: Retry a failed or quarantined resume upload
      tags: [recruiter-actions]
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: upload_id, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        '204': { description: upload reset to pending }
        '401': { description: missing identity }
        '404': { description: upload not found }
        '409': { description: upload not in retryable state }
  /intents/{intent_id}/applications:rescore:
    post:
      summary: Trigger on-demand rescore for all applications under an intent
      tags: [recruiter-actions]
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: intent_id, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        '202': { description: rescore enqueued }
        '401': { description: missing identity }
        '404': { description: intent not found }
  /resumes/batches/{batch_id}/events:
    get:
      summary: SSE stream of live batch progress events
      tags: [recruiter-actions]
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: batch_id, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        '200':
          description: |
            Server-sent event stream. Heartbeat `:ping` every 30 s.
            Event types: item_accepted, item_failed, item_extracted, item_parsed.
            Each data payload is a JSON object containing upload_id, batch_id,
            and event-specific fields.
          content:
            text/event-stream:
              schema: { type: string }
        '401': { description: missing identity }
        '404': { description: batch not found }
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    BatchUploadResponse:
      type: object
      description: |
        Batch upload response with per-file outcomes. ZIP files are extracted
        server-side; each entry surfaces as a separate item with parent_filename
        and parent_item_id linking to the extracted_from_zip marker row.
      properties:
        batch_id: { type: string, format: uuid }
        items:
          type: array
          items: { $ref: '#/components/schemas/BatchItemResponse' }
    BatchItemResponse:
      type: object
      properties:
        filename: { type: string }
        upload_id: { type: string, format: uuid }
        status: { type: string, enum: [queued, deduplicated, duplicate_in_intent, extracted_from_zip] }
        candidate_id: { type: string, format: uuid }
        parent_filename: { type: string }
        parent_item_id: { type: string, format: uuid }
        error: { $ref: '#/components/schemas/BatchItemError' }
    BatchItemError:
      type: object
      properties:
        code: { type: string }
        message: { type: string }
        detail: { type: object, additionalProperties: true }
    BatchStatusResponse:
      type: object
      properties:
        batch_id: { type: string, format: uuid }
        intent_id: { type: string, format: uuid }
        summary: { $ref: '#/components/schemas/BatchStatusSummary' }
        items:
          type: array
          items: { $ref: '#/components/schemas/BatchStatusItem' }
    BatchStatusSummary:
      type: object
      properties:
        total: { type: integer }
        in_flight: { type: integer }
        extracted: { type: integer }
        failed: { type: integer }
        quarantined: { type: integer }
    BatchStatusItem:
      type: object
      properties:
        upload_id: { type: string, format: uuid }
        filename: { type: string }
        status: { type: string }
        attempt: { type: integer }
        last_error: { type: string }
    CandidateDetailResponse:
      type: object
      properties:
        id: { type: string, format: uuid }
        content_hash: { type: string }
        personal: { $ref: '#/components/schemas/CandidatePersonal' }
        location: { type: string }
        headline: { type: string }
        profile:
          type: object
          description: Full parsed profile with PII in cleartext (server-side decrypted).
          additionalProperties: true
        source: { type: string }
        created_at: { type: string, format: date-time }
    CandidatePersonal:
      type: object
      properties:
        full_name: { type: string }
        email: { type: string, format: email }
        phone: { type: string }
    ApplicationListResponse:
      type: object
      properties:
        items:
          type: array
          items: { $ref: '#/components/schemas/ApplicationListItem' }
        total: { type: integer }
        facets: { $ref: '#/components/schemas/ApplicationListFacets' }
    ApplicationListItem:
      type: object
      properties:
        application_id: { type: string, format: uuid }
        candidate: { $ref: '#/components/schemas/ApplicationCandidate' }
        score: { $ref: '#/components/schemas/ApplicationScore' }
        status: { type: string }
        scored_at: { type: string, format: date-time }
    ApplicationCandidate:
      type: object
      properties:
        id: { type: string, format: uuid }
        full_name_masked: { type: string }
        headline: { type: string }
        location: { type: string }
        top_skills:
          type: array
          items:
            type: object
            properties:
              name: { type: string }
              years: { type: number }
        judge_summary: { type: string }
    ApplicationScore:
      type: object
      properties:
        overall: { type: number }
        band: { type: string, enum: [strong, moderate, weak] }
        embedding_score: { type: number }
        rule_match:
          type: object
          description: RuleMatchReport JSON
          additionalProperties: true
        llm:
          type: object
          description: LLMJudgment JSON (only for judged rows)
          additionalProperties: true
    ApplicationListFacets:
      type: object
      properties:
        strong: { type: integer }
        moderate: { type: integer }
        weak: { type: integer }
    ApplicationRejectRequest:
      type: object
      required: [reason]
      properties:
        reason: { type: string, minLength: 1 }
    ErrorResponse:
      type: object
      properties:
        error: { type: string }
        detail: { type: string }
