openapi: 3.0.3
info:
  title: hireflow — hiringintent v1
  version: 1.0.0
  description: |
    Recruiter API for the hiringintent bounded context.
    Captures, confirms, and lists hiring intents within a tenant.

servers:
  - url: http://localhost:8080/api/v1

security:
  - bearerAuth: []

paths:
  /intents:
    get:
      summary: List hiring intents for the tenant
      parameters:
        - in: query
          name: status
          schema: { type: string, enum: [DRAFTED, CONFIRMED, CANCELLED, CLOSED] }
        - in: query
          name: recruiter_id
          schema: { type: string, format: uuid }
        - in: query
          name: q
          description: Free-text search on role title (ILIKE).
          schema: { type: string }
        - in: query
          name: sort
          description: Result ordering. Defaults to NEWEST.
          schema: { type: string, enum: [NEWEST, URGENT], default: NEWEST }
        - in: query
          name: limit
          schema: { type: integer, default: 50, maximum: 200 }
        - in: query
          name: offset
          schema: { type: integer, default: 0 }
      responses:
        '200':
          description: Page of intents
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IntentListResponse'

  /intents/summary:
    get:
      summary: Per-status counts for the tenant's intents
      description: |
        Returns the histogram of intents grouped by status, plus a total.
        Used by the FE to render filter chips with counts on the list page.
      responses:
        '200':
          description: Summary counts
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IntentSummaryResponse'

    post:
      summary: Draft a new hiring intent
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateIntentRequest'
      responses:
        '201':
          description: Intent drafted
          headers:
            Location:
              schema: { type: string }
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IntentResponse'
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '422': { $ref: '#/components/responses/ValidationFailed' }

  /intents/{id}:
    get:
      summary: Get a single intent
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Intent
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IntentResponse'
        '404': { $ref: '#/components/responses/NotFound' }

  /intents/{id}/confirm:
    post:
      summary: Confirm a drafted intent
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Intent confirmed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IntentResponse'
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }
        '422': { $ref: '#/components/responses/ValidationFailed' }

  /intents/extract:
    post:
      summary: Run one LLM extraction turn on a free-text recruiter message
      description: |
        Read-only relative to the domain. Returns a sparse `patch` (fields to
        merge into the in-progress draft), a chat reply, and a `complete`
        flag. Stateless server — caller passes the prior chat history and
        current draft on every turn.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ExtractRequest'
      responses:
        '200':
          description: Extraction successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExtractResponse'
        '400':
          description: |
            Validation rejected. Error codes:
            - `user_message_required` — body had no `user_message`
            - `message_too_long` — `user_message` > 4000 chars
            - `invalid_json` — malformed body
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '429':
          description: |
            AI service is rate-limited (transient). Error code: `llm_rate_limited`.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '503':
          description: |
            AI service is unavailable. Specific error codes the FE branches on:
            - `llm_billing` — Anthropic workspace is out of credits (operator action)
            - `llm_auth_error` — API key missing/invalid (operator action)
            - `llm_permission_error` — workspace can't access the model (operator action)
            - `llm_overloaded` — upstream is overloaded (transient)
            - `llm_response_error` — model returned an unexpected shape (transient)
            - `llm_unavailable` — generic / unclassified upstream failure
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '504':
          description: |
            AI service didn't respond within the request timeout (transient).
            Error code: `llm_timeout`.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        HS256-signed access token issued by the auth context. Required claims:
        tenant_id (UUID), recruiter_id (UUID). Optional: roles (string array).

  schemas:
    Skill:
      type: object
      required: [name, required]
      properties:
        name:     { type: string }
        required: { type: boolean }

    Budget:
      type: object
      required: [min_minor, max_minor, currency]
      properties:
        min_minor: { type: integer, format: int64 }
        max_minor: { type: integer, format: int64 }
        currency:  { type: string, minLength: 3, maxLength: 3 }

    CreateIntentRequest:
      type: object
      required: [role_title, headcount, work_mode, priority]
      properties:
        role_title: { type: string }
        skills:
          type: array
          items: { $ref: '#/components/schemas/Skill' }
        min_years: { type: integer, minimum: 0 }
        max_years: { type: integer, minimum: 0 }
        headcount: { type: integer, minimum: 1 }
        locations:
          type: array
          items: { type: string }
        work_mode: { type: string, enum: [ONSITE, REMOTE, HYBRID] }
        priority:  { type: string, enum: [LOW, MEDIUM, HIGH, CRITICAL] }
        budget:    { $ref: '#/components/schemas/Budget' }
        reason:    { type: string, maxLength: 500, description: 'Why the role exists (free text).' }
        team:      { type: string, maxLength: 500, description: 'Team / squad / pod the hire joins.' }
        reports_to:{ type: string, maxLength: 500, description: 'Hiring manager or reporting line.' }

    IntentSignal:
      type: object
      properties:
        label: { type: string }
        value: { type: string }
        level: { type: string, enum: [LOW, MEDIUM, HIGH] }

    TrustSignal:
      type: object
      properties:
        label:    { type: string }
        value:    { type: string }
        required: { type: boolean }

    Intent:
      type: object
      properties:
        id:           { type: string, format: uuid }
        tenant_id:    { type: string, format: uuid }
        recruiter_id: { type: string, format: uuid }
        role:
          type: object
          properties:
            title:      { type: string }
            skills:
              type: array
              items: { $ref: '#/components/schemas/Skill' }
            experience:
              type: object
              properties:
                min_years: { type: integer }
                max_years: { type: integer }
            headcount: { type: integer }
            locations:
              type: array
              items: { type: string }
            work_mode: { type: string }
        priority: { type: string }
        intent_signals:
          type: array
          items: { $ref: '#/components/schemas/IntentSignal' }
        trust_signals:
          type: array
          items: { $ref: '#/components/schemas/TrustSignal' }
        budget: { $ref: '#/components/schemas/Budget' }
        reason:     { type: string }
        team:       { type: string }
        reports_to: { type: string }
        status: { type: string }
        created_at:   { type: string, format: date-time }
        updated_at:   { type: string, format: date-time }
        confirmed_at: { type: string, format: date-time, nullable: true }
        cancelled_at: { type: string, format: date-time, nullable: true }
        cancel_reason: { type: string }

    IntentResponse:
      type: object
      properties:
        success: { type: boolean }
        data:    { $ref: '#/components/schemas/Intent' }

    IntentListResponse:
      type: object
      properties:
        success: { type: boolean }
        data:
          type: array
          items: { $ref: '#/components/schemas/Intent' }

    StatusCounts:
      type: object
      required: [DRAFTED, CONFIRMED, CANCELLED, CLOSED, total]
      properties:
        DRAFTED:   { type: integer }
        CONFIRMED: { type: integer }
        CANCELLED: { type: integer }
        CLOSED:    { type: integer }
        total:     { type: integer }

    IntentSummary:
      type: object
      required: [counts]
      properties:
        counts: { $ref: '#/components/schemas/StatusCounts' }

    IntentSummaryResponse:
      type: object
      properties:
        success: { type: boolean }
        data:    { $ref: '#/components/schemas/IntentSummary' }

    ExtractMessage:
      type: object
      required: [role, text]
      properties:
        role: { type: string, enum: [user, assistant] }
        text: { type: string }

    ExtractDraft:
      description: Sparse mirror of CreateIntentRequest. Empty/zero values are treated as "not yet filled".
      type: object
      properties:
        role_title: { type: string }
        skills:
          type: array
          items: { $ref: '#/components/schemas/Skill' }
        min_years: { type: integer, minimum: 0 }
        max_years: { type: integer, minimum: 0 }
        headcount: { type: integer, minimum: 0 }
        locations:
          type: array
          items: { type: string }
        work_mode: { type: string, enum: [ONSITE, REMOTE, HYBRID] }
        priority:  { type: string, enum: [LOW, MEDIUM, HIGH, CRITICAL] }
        budget:    { $ref: '#/components/schemas/Budget' }
        reason:    { type: string, maxLength: 500 }
        team:      { type: string, maxLength: 500 }
        reports_to:{ type: string, maxLength: 500 }

    ExtractRequest:
      type: object
      required: [user_message]
      properties:
        messages:
          type: array
          description: Prior chat history excluding the current user turn.
          items: { $ref: '#/components/schemas/ExtractMessage' }
        draft: { $ref: '#/components/schemas/ExtractDraft' }
        user_message:
          type: string
          maxLength: 4000
          description: The recruiter's latest turn.

    DraftPatch:
      description: Sparse — only fields the LLM updated this turn appear.
      type: object
      properties:
        role_title: { type: string }
        skills:
          type: array
          items: { $ref: '#/components/schemas/Skill' }
        min_years: { type: integer, minimum: 0 }
        max_years: { type: integer, minimum: 0 }
        headcount: { type: integer, minimum: 1 }
        locations:
          type: array
          items: { type: string }
        work_mode: { type: string, enum: [ONSITE, REMOTE, HYBRID] }
        priority:  { type: string, enum: [LOW, MEDIUM, HIGH, CRITICAL] }
        budget:    { $ref: '#/components/schemas/Budget' }
        reason:    { type: string, maxLength: 500 }
        team:      { type: string, maxLength: 500 }
        reports_to:{ type: string, maxLength: 500 }

    ExtractResponse:
      type: object
      required: [success, data]
      properties:
        success: { type: boolean }
        data:
          type: object
          required: [reply, patch, complete]
          properties:
            reply:    { type: string }
            patch:    { $ref: '#/components/schemas/DraftPatch' }
            complete: { type: boolean }
            missing:
              type: array
              items: { type: string }
            warnings:
              type: array
              items: { type: string }

    Error:
      type: object
      properties:
        success: { type: boolean, example: false }
        error:
          type: object
          properties:
            code:    { type: string }
            message: { type: string }

  responses:
    BadRequest:
      description: Bad request
      content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } }
    Unauthorized:
      description: Identity headers missing
      content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } }
    NotFound:
      description: Intent not found
      content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } }
    Conflict:
      description: Invalid state transition
      content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } }
    ValidationFailed:
      description: Domain invariant violated
      content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } }
